services:
  api01: &api
    image: ghcr.io/juanvieiraprado99/rinha2026-fraud:latest
    environment:
      - PORT=9999
      - NPROBE=24
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "155MB"

  api02:
    <<: *api
    environment:
      - PORT=9999
      - NPROBE=24

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "40MB"

networks:
  app:
    driver: bridge
