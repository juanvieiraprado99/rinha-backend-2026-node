services:
  api01: &api
    image: ghcr.io/juanvieiraprado99/rinha-backend-2026-node:latest
    environment:
      - PORT=9999
      - NPROBE=24
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9999/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "157MB"

  api02:
    <<: *api
    environment:
      - PORT=9999
      - NPROBE=24

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api01
      - api02
    ports:
      - "9999:9999"
    networks:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "36MB"

networks:
  app:
    driver: bridge
